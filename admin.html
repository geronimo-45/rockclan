<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RockClan 관리자</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a; --surface: #1a1a2e; --card: #16213e;
      --accent: #ff6a00; --accent2: #e05200;
      --text: #e0e0e0; --muted: #888; --border: #2a2a4a;
      --danger: #e05252; --success: #52c087; --warn: #f0b429;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

    /* 헤더 */
    header {
      background: var(--surface); border-bottom: 2px solid var(--accent);
      padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    }
    header h1 { font-size: 1.1rem; } header h1 span { color: var(--accent); }
    #userInfo { font-size: .82rem; color: var(--muted); display: none; align-items: center; gap: 10px; }
    #userInfo strong { color: var(--text); }

    /* 탭 */
    .main-tabs { display: flex; gap: 8px; background: var(--surface); padding: 10px 20px; border-bottom: 1px solid var(--border); }
    .main-tab {
      padding: 7px 18px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; font-size: .88rem;
    }
    .main-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* 레이아웃 */
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    main { max-width: 900px; margin: 0 auto; padding: 20px 14px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 18px; }
    .card h2 { font-size: .95rem; color: var(--accent); margin-bottom: 14px; }

    /* 공통 인풋 */
    input[type="text"], input[type="password"], input[type="date"], select, textarea {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); padding: 7px 10px; font-size: .88rem; width: 100%;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    label.field-label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: 4px; }

    /* 버튼 */
    button { cursor: pointer; border: none; border-radius: 6px; padding: 7px 16px; font-size: .88rem; transition: background .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-danger:hover  { background: #c04040; }
    .btn-ghost   { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover   { border-color: var(--accent); color: var(--accent); }
    .btn-success { background: var(--success); color: #000; }
    .btn-warn    { background: var(--warn); color: #000; }
    .btn-sm      { padding: 4px 10px; font-size: .78rem; }
    button:disabled { opacity: .45; cursor: not-allowed; }

    /* 로그인 */
    #loginSection { max-width: 380px; margin: 60px auto; }
    #loginError { color: var(--danger); font-size: .82rem; margin-top: 8px; min-height: 18px; }

    /* ── 경기 입력 ── */
    .mode-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .mode-tab {
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: .83rem; cursor: pointer;
    }
    .mode-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* 라운드 입력 - 팀 구성 */
    .team-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .team-col h3 { font-size: .82rem; color: var(--muted); margin-bottom: 6px; }

    /* 체크박스 드롭다운 */
    .checkbox-dropdown { position: relative; margin-bottom: 8px; }
    .dropdown-trigger {
      width: 100%; text-align: left; background: var(--surface);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); padding: 7px 10px; font-size: .85rem;
      display: flex; justify-content: space-between; align-items: center; cursor: pointer;
    }
    .dropdown-trigger:hover { border-color: var(--accent); }
    .dropdown-trigger .trigger-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dropdown-panel {
      display: none; position: absolute; top: calc(100% + 3px); left: 0; right: 0;
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: 8px; z-index: 50; max-height: 400px; overflow-y: auto;
      box-shadow: 0 4px 16px rgba(0,0,0,.5);
    }
    .dropdown-panel.open { display: block; }
    .dropdown-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; cursor: pointer; font-size: .83rem; user-select: none;
    }
    .dropdown-item:hover { background: rgba(255,106,0,0.12); }
    .dropdown-item input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; flex-shrink: 0; }
    .selected-chips { display: flex; flex-wrap: wrap; gap: 4px; min-height: 24px; }
    .s-chip {
      background: rgba(255,106,0,0.15); border: 1px solid rgba(255,106,0,0.4);
      border-radius: 10px; padding: 2px 9px; font-size: .78rem; color: var(--accent);
    }
    .team-summary {
      flex: 1; border-radius: 8px; padding: 8px 12px;
    }
    .team-summary.t1 { background: rgba(42,74,138,0.2); border: 1px solid #4a6aaa; }
    .team-summary.t2 { background: rgba(138,42,42,0.2); border: 1px solid #8a4a4a; }
    .team-summary .ts-label { font-size: .72rem; margin-bottom: 3px; }
    .team-summary.t1 .ts-label { color: #8ab4f8; }
    .team-summary.t2 .ts-label { color: #f8a8a8; }
    .team-summary .ts-players { font-size: .82rem; }

    /* 매치업 테이블 */
    .matchup-list { display: flex; flex-direction: column; gap: 6px; margin: 10px 0; }
    .order-btns { display: flex; flex-direction: column; gap: 2px; }
    .order-btn { background: transparent; border: 1px solid var(--border); border-radius: 3px; color: var(--muted); width: 20px; height: 15px; font-size: .6rem; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
    .order-btn:hover { border-color: var(--accent); color: var(--accent); }
    .matchup-row {
      display: grid; grid-template-columns: 22px 1fr 36px 1fr 100px 1fr 28px; gap: 6px; align-items: center;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px;
    }
    .matchup-row .vs { text-align: center; color: var(--muted); font-size: .8rem; }
    .winner-pick { display: flex; gap: 4px; }
    .wpick { flex: 1; padding: 4px 5px; font-size: .73rem; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wpick.sel1 { background: #2a4a8a; color: #8ab4f8; border-color: #4a6aaa; }
    .wpick.sel2 { background: #4a2a2a; color: #f8a8a8; border-color: #8a4a4a; }

    /* 팀전 행 */
    .teamgame-row {
      display: grid; grid-template-columns: 22px 1fr 36px 1fr 100px 1fr 28px; gap: 6px; align-items: start;
      background: rgba(255,106,0,0.05); border: 1px solid rgba(255,106,0,0.2); border-radius: 8px; padding: 7px 10px;
    }
    .teamgame-row .tg-label { font-size: .75rem; color: #ffb347; text-align: center; padding-top: 6px; }
    .tg-checks { display: flex; flex-direction: column; gap: 4px; }
    .tg-check-item { display: flex; align-items: center; gap: 5px; font-size: .78rem; cursor: pointer; }
    .tg-check-item input { accent-color: var(--accent); }

    /* 최종 결과 행 */
    .final-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 12px; align-items: end; }
    .final-row .field-group label { font-size: .78rem; color: var(--muted); display: block; margin-bottom: 4px; }
    .team-winner-btns { display: flex; gap: 6px; }
    .twbtn { flex: 1; padding: 7px; font-size: .8rem; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; }
    .twbtn.sel { background: var(--success); color: #000; border-color: var(--success); }

    /* 단일 입력 */
    .single-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .single-players { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .winner-opts { display: flex; gap: 8px; flex-wrap: wrap; }
    .wopt { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: .83rem; }
    .wopt.active { background: var(--success); color: #000; border-color: var(--success); }

    /* 최근 기록 */
    #recentList { display: flex; flex-direction: column; gap: 6px; }
    .rec-row {
      background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
      padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; font-size: .82rem; gap: 8px;
    }
    .rec-row .meta { color: var(--muted); font-size: .75rem; }
    .rec-actions { display: flex; gap: 4px; flex-shrink: 0; }

    /* 선수 관리 */
    .player-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .player-table th, .player-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    .player-table th { color: var(--muted); font-size: .75rem; }
    .add-player-form { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; align-items: end; margin-top: 14px; }
    .add-player-form label { font-size: .78rem; color: var(--muted); display: block; margin-bottom: 4px; }

    /* 수정 모달 */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.75); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 22px; width: min(480px, 95vw);
      max-height: 90vh; overflow-y: auto;
    }
    .modal-box h2 { font-size: .95rem; color: var(--accent); margin-bottom: 16px; }
    .modal-box.pro-edit { width: min(720px, 95vw); }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .edit-field { margin-bottom: 10px; }
    .edit-winner-row { display: flex; gap: 6px; }
    .ewbtn { flex: 1; padding: 7px; font-size: .8rem; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; }
    .ewbtn.sel { background: var(--success); color: #000; border-color: var(--success); }

    /* 토스트 */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--success); color: #000; padding: 9px 22px; border-radius: 8px;
      font-weight: 600; font-size: .88rem; opacity: 0; transition: all .3s; pointer-events: none; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--danger); color: #fff; }

    @media (max-width: 600px) {
      .matchup-row, .teamgame-row { grid-template-columns: 18px 1fr 28px 1fr 70px minmax(0,1fr) 22px; }
      .single-grid { grid-template-columns: 1fr 1fr; }
      .add-player-form { grid-template-columns: 1fr 1fr; }
      .team-row { grid-template-columns: 1fr; }
      .final-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>RockClan <span>관리자</span></h1>
  <div id="userInfo">
    <span>👤 <strong id="userNick"></strong> <span id="roleTag"></span></span>
    <button class="btn-ghost btn-sm" onclick="logout()">로그아웃</button>
  </div>
</header>

<!-- 로그인 -->
<main id="loginSection">
  <div class="card">
    <h2>🔐 로그인</h2>
    <div style="margin-bottom:10px">
      <label class="field-label">ID</label>
      <input type="text" id="loginId" placeholder="관리자 ID 입력" onkeydown="if(event.key==='Enter')login()" />
    </div>
    <div style="margin-bottom:12px">
      <label class="field-label">비밀번호</label>
      <input type="password" id="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')login()" />
    </div>
    <button class="btn-primary" id="loginBtn" onclick="login()" style="width:100%">로그인</button>
    <div id="loginError"></div>
  </div>
</main>

<!-- 관리자 패널 -->
<div id="adminSection" style="display:none">
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchMainTab('match')">⚔️ 경기 입력</button>
    <button class="main-tab" id="playerTab" onclick="switchMainTab('player')">👤 선수 관리</button>
  </div>

  <!-- ══ 경기 입력 탭 ══ -->
  <div id="tab-match" class="tab-content active">
    <main>

      <!-- 입력 모드 선택 -->
      <div class="card">
        <h2>경기 결과 입력</h2>

        <div style="display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap">
          <div style="flex:1;min-width:140px">
            <label class="field-label">날짜</label>
            <input type="date" id="matchDate" />
          </div>
        </div>

        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="round" onclick="setMode('round')">🏆 프로리그 라운드 (일괄 입력)</button>
        </div>

        <!-- ─ 프로리그 라운드 모드 ─ -->
        <div id="mode-round">

          <!-- Phase 1: 팀 구성 -->
          <div id="teamSetupPhase">
            <div class="team-row">
              <div class="team-col">
                <h3>🔵 팀 1 선수 선택</h3>
                <div class="checkbox-dropdown" id="t1Dropdown">
                  <button type="button" class="dropdown-trigger" onclick="toggleDropdown(1)">
                    <span class="trigger-text" id="t1TriggerText">선수를 선택하세요...</span>
                    <span style="color:var(--muted);font-size:.8rem">▾</span>
                  </button>
                  <div class="dropdown-panel" id="t1Panel"></div>
                </div>
                <div class="selected-chips" id="t1chips"></div>
              </div>
              <div class="team-col">
                <h3>🔴 팀 2 선수 선택</h3>
                <div class="checkbox-dropdown" id="t2Dropdown">
                  <button type="button" class="dropdown-trigger" onclick="toggleDropdown(2)">
                    <span class="trigger-text" id="t2TriggerText">선수를 선택하세요...</span>
                    <span style="color:var(--muted);font-size:.8rem">▾</span>
                  </button>
                  <div class="dropdown-panel" id="t2Panel"></div>
                </div>
                <div class="selected-chips" id="t2chips"></div>
              </div>
            </div>
            <button class="btn-primary" onclick="confirmTeams()" style="margin-top:4px">팀 구성 완료 →</button>
          </div>

          <!-- Phase 2: 매치업 입력 -->
          <div id="matchupPhase" style="display:none">

            <!-- 팀 요약 -->
            <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
              <div class="team-summary t1">
                <div class="ts-label">🔵 팀 1</div>
                <div class="ts-players" id="teamSummary1"></div>
              </div>
              <div class="team-summary t2">
                <div class="ts-label">🔴 팀 2</div>
                <div class="ts-players" id="teamSummary2"></div>
              </div>
              <button class="btn-ghost btn-sm" onclick="resetTeams()" style="white-space:nowrap;align-self:center">← 팀 재구성</button>
            </div>

            <!-- 매치업 헤더 -->
            <div style="display:flex;gap:8px;margin-bottom:6px;align-items:center;flex-wrap:wrap">
              <span style="font-size:.82rem;color:var(--muted)">매치업 추가</span>
              <button class="btn-ghost btn-sm" onclick="addMatchup()">+ 개인전</button>
              <button class="btn-ghost btn-sm" onclick="addTeamGame()">+ 팀전</button>
            </div>
            <div style="display:grid;grid-template-columns:1fr 36px 1fr 100px 1fr 28px;gap:6px;padding:0 10px;margin-bottom:2px">
              <span style="font-size:.72rem;color:var(--muted)">🔵 팀1 선수</span>
              <span></span>
              <span style="font-size:.72rem;color:var(--muted)">🔴 팀2 선수</span>
              <span style="font-size:.72rem;color:var(--muted)">맵</span>
              <span style="font-size:.72rem;color:var(--muted)">승자</span>
              <span></span>
            </div>
            <div class="matchup-list" id="matchupList"></div>

            <!-- 최종 결과 -->
            <div class="final-row">
              <div class="field-group">
                <label>최종 스코어</label>
                <input type="text" id="roundScore" placeholder="예: 3:4" />
              </div>
              <div class="field-group">
                <label>승리팀</label>
                <div class="team-winner-btns">
                  <button class="twbtn" id="twBtn1" onclick="setTeamWinner(1)">팀 1 승</button>
                  <button class="twbtn" id="twBtn2" onclick="setTeamWinner(2)">팀 2 승</button>
                </div>
              </div>
              <div>
                <button class="btn-primary" id="roundSaveBtn" onclick="saveRound()" style="width:100%;margin-top:20px">
                  라운드 전체 저장
                </button>
              </div>
            </div>
          </div>

        </div>

      </div>

      <!-- 최근 입력 목록 -->
      <div class="card">
        <h2 style="display:flex;justify-content:space-between;align-items:center">
          <span>📋 최근 Match (30건)</span>
          <button class="btn-ghost btn-sm" onclick="loadRecent()">새로고침</button>
        </h2>
        <div id="recentList"><p style="color:var(--muted);font-size:.83rem">불러오는 중...</p></div>
      </div>

    </main>
  </div>

  <!-- ══ 선수 관리 탭 ══ -->
  <div id="tab-player" class="tab-content">
    <main>
      <div class="card">
        <h2>👤 선수 목록</h2>
        <table class="player-table">
          <thead><tr><th>ID</th><th>종족</th><th>티어</th><th></th></tr></thead>
          <tbody id="playerTableBody"><tr><td colspan="4" style="color:var(--muted)">불러오는 중...</td></tr></tbody>
        </table>

        <div class="add-player-form">
          <div>
            <label>닉네임 (ID)</label>
            <input type="text" id="newId" placeholder="닉네임" />
          </div>
          <div>
            <label>종족</label>
            <select id="newRace">
              <option value="Terran">Terran</option>
              <option value="Protoss">Protoss</option>
              <option value="Zerg">Zerg</option>
            </select>
          </div>
          <div>
            <label>티어</label>
            <select id="newTier">
              <option>Stone</option><option>Bronze</option><option selected>Silver</option>
              <option>Gold</option><option>Diamond</option><option>Legend</option>
            </select>
          </div>
          <div style="display:flex;align-items:flex-end">
            <button class="btn-primary" onclick="addPlayer()" style="white-space:nowrap">+ 추가</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- 경기 수정 모달 -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <h2>✏️ 경기 수정</h2>
    <div id="editForm"></div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeEdit()">취소</button>
      <button class="btn-primary" id="editSaveBtn" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── 설정 ──────────────────────────────────────────────────────
const SUPABASE_URL      = 'https://ugrvylgrkwjtyekpznau.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVncnZ5bGdya3dqdHlla3B6bmF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDgxNDMsImV4cCI6MjA4ODM4NDE0M30.tIBkee7X97IDuBQQg8ugwOrLsW2RzCRoqM-CNEnR4Ao';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null, currentRole = null, playerList = [];
let currentMode = 'round';
let t1 = [], t2 = [];
let teamWinner = null;
let singleTeamWinner = null;

// 수정 모달 상태
let editingMatch = null;
let editWinnerSide = null;   // 팀전/프로리그 수정 시 승리팀 (1 or 2)
let editSoloWinner = null;   // 개인전 수정 시 승자 이름

// 프로리그 라운드 수정 상태
let editingProHeader = null;
let editingProRowIds = [];
let editProT1 = [], editProT2 = [];
let editProWinner = null;

// ── 초기화 ────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('matchDate').value = new Date().toISOString().slice(0, 10);
  const { data: { session } } = await sb.auth.getSession();
  if (session) await onLogin(session.user);
  sb.auth.onAuthStateChange((_e, s) => { if (s) onLogin(s.user); else showLogin(); });
});

// ── 탭 전환 ──────────────────────────────────────────────────
function switchMainTab(name) {
  document.querySelectorAll('.main-tab').forEach((b, i) => b.classList.toggle('active', ['match','player'][i] === name));
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'player') renderPlayerTable();
}

// ── 로그인 (ID 기반) ──────────────────────────────────────────
async function login() {
  const loginId = document.getElementById('loginId').value.trim();
  const pw      = document.getElementById('password').value;
  const errEl   = document.getElementById('loginError');
  const btn     = document.getElementById('loginBtn');
  errEl.textContent = ''; btn.disabled = true; btn.textContent = '로그인 중...';

  // login_id → email 조회 (RPC)
  const { data: email, error: rpcErr } = await sb.rpc('get_email_by_login_id', { p_login_id: loginId });
  if (rpcErr || !email) {
    errEl.textContent = '❌ 존재하지 않는 ID입니다.';
    btn.disabled = false; btn.textContent = '로그인';
    return;
  }

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  btn.disabled = false; btn.textContent = '로그인';
  if (error) { errEl.textContent = '❌ 비밀번호가 올바르지 않습니다.'; return; }
  await onLogin(data.user);
}

async function onLogin(user) {
  currentUser = user;
  const { data: roleRow } = await sb.from('user_roles').select('role,nickname,login_id').eq('user_id', user.id).single();
  if (!roleRow) { await sb.auth.signOut(); document.getElementById('loginError').textContent = '❌ 권한이 없습니다.'; return; }
  currentRole = roleRow.role;
  document.getElementById('userNick').textContent = roleRow.nickname || roleRow.login_id || 'admin';
  document.getElementById('roleTag').textContent  = currentRole === 'admin' ? '🛡 관리자' : '✏️ 에디터';
  document.getElementById('playerTab').style.display = currentRole === 'admin' ? '' : 'none';
  document.getElementById('userInfo').style.display = 'flex';
  document.getElementById('loginSection').style.display  = 'none';
  document.getElementById('adminSection').style.display  = 'block';
  await loadPlayers();
  setMode('round');
  buildTeamInputs();
  await loadRecent();
}

function showLogin() {
  currentUser = null; currentRole = null;
  document.getElementById('loginSection').style.display  = 'block';
  document.getElementById('adminSection').style.display  = 'none';
  document.getElementById('userInfo').style.display = 'none';
}
async function logout() { await sb.auth.signOut(); showLogin(); }

// ── 선수 목록 ────────────────────────────────────────────────
async function loadPlayers() {
  const { data } = await sb.from('players').select('*').order('id');
  playerList = data || [];
  fillPlayerSelects();
}

function playerOpts(exclude = []) {
  return '<option value="">-- 선택 --</option>' +
    playerList.filter(p => !exclude.includes(p.id))
      .map(p => `<option value="${esc(p.id)}">${esc(p.id)} (${p.race[0]}/${p.tier})</option>`).join('');
}

// 현재 값이 playerList에 없어도 항상 선택된 상태로 표시
function playerOptsWithCurrent(currentVal, exclude = []) {
  const listOpts = playerList.filter(p => !exclude.includes(p.id))
    .map(p => `<option value="${esc(p.id)}"${p.id === currentVal ? ' selected' : ''}>${esc(p.id)} (${p.race[0]}/${p.tier})</option>`).join('');
  let extra = '';
  if (currentVal && !playerList.some(p => p.id === currentVal)) {
    extra = `<option value="${esc(currentVal)}" selected>${esc(currentVal)}</option>`;
  }
  return `<option value="">-- 선택 --</option>${extra}${listOpts}`;
}

function fillPlayerSelects() {
  renderCheckboxDropdowns();
}

// ── 입력 모드 ─────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  ['round','solo','team'].forEach(m => document.getElementById('mode-' + m).style.display = m === mode ? 'block' : 'none');
}

// ── 체크박스 드롭다운 (팀 구성) ──────────────────────────────
function renderCheckboxDropdowns() {
  [1, 2].forEach(team => {
    const panel = document.getElementById('t' + team + 'Panel');
    if (!panel) return;
    const arr = team === 1 ? t1 : t2;
    panel.innerHTML = playerList.map(p => `
      <label class="dropdown-item">
        <input type="checkbox" value="${esc(p.id)}" ${arr.includes(p.id) ? 'checked' : ''}
          onchange="onCheckPlayer(${team}, '${esc(p.id)}', this.checked)" />
        ${esc(p.id)} <span style="color:var(--muted);font-size:.73rem">(${p.race[0]}/${p.tier})</span>
      </label>`).join('');
  });
}

function toggleDropdown(team) {
  const panel = document.getElementById('t' + team + 'Panel');
  const isOpen = panel.classList.contains('open');
  // 다른 드롭다운 닫기
  [1, 2].forEach(t => document.getElementById('t' + t + 'Panel').classList.remove('open'));
  if (!isOpen) panel.classList.add('open');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.checkbox-dropdown')) {
    [1, 2].forEach(t => {
      const panel = document.getElementById('t' + t + 'Panel');
      if (panel) panel.classList.remove('open');
    });
  }
});

function onCheckPlayer(team, id, checked) {
  const arr = team === 1 ? t1 : t2;
  if (checked && !arr.includes(id)) arr.push(id);
  if (!checked) { const i = arr.indexOf(id); if (i !== -1) arr.splice(i, 1); }
  updateTeamDisplay(team);
}

function updateTeamDisplay(team) {
  const arr = team === 1 ? t1 : t2;
  const triggerText = document.getElementById('t' + team + 'TriggerText');
  const chipsEl = document.getElementById('t' + team + 'chips');
  if (triggerText) triggerText.textContent = arr.length ? `${arr.length}명 선택됨` : '선수를 선택하세요...';
  if (chipsEl) chipsEl.innerHTML = arr.map(p => `<span class="s-chip">${esc(p)}</span>`).join('');
}

function confirmTeams() {
  if (!t1.length || !t2.length) { toast('양 팀에 선수를 선택하세요', true); return; }
  [1, 2].forEach(t => document.getElementById('t' + t + 'Panel').classList.remove('open'));
  document.getElementById('teamSetupPhase').style.display = 'none';
  document.getElementById('matchupPhase').style.display = 'block';
  document.getElementById('teamSummary1').textContent = t1.join(', ');
  document.getElementById('teamSummary2').textContent = t2.join(', ');
  // 팀원 수에 맞게 개인전 매치업 자동 생성
  document.getElementById('matchupList').innerHTML = '';
  const n = Math.max(t1.length, t2.length);
  for (let i = 0; i < n; i++) addMatchup(t1[i] || '', t2[i] || '');
}

function resetTeams() {
  t1 = []; t2 = []; teamWinner = null;
  document.getElementById('teamSetupPhase').style.display = 'block';
  document.getElementById('matchupPhase').style.display = 'none';
  document.getElementById('matchupList').innerHTML = '';
  document.getElementById('roundScore').value = '';
  document.getElementById('twBtn1').classList.remove('sel');
  document.getElementById('twBtn2').classList.remove('sel');
  // 체크박스 초기화
  document.querySelectorAll('#t1Panel input, #t2Panel input').forEach(cb => cb.checked = false);
  updateTeamDisplay(1); updateTeamDisplay(2);
}

// ── 라운드 매치업 ─────────────────────────────────────────────
function addMatchup(defaultP1 = '', defaultP2 = '') {
  const list = document.getElementById('matchupList');
  const div  = document.createElement('div');
  div.className = 'matchup-row';
  const t1Opts = '<option value="">선택</option>' +
    t1.map(p => `<option value="${esc(p)}"${p === defaultP1 ? ' selected' : ''}>${esc(p)}</option>`).join('');
  const t2Opts = '<option value="">선택</option>' +
    t2.map(p => `<option value="${esc(p)}"${p === defaultP2 ? ' selected' : ''}>${esc(p)}</option>`).join('');
  div.innerHTML = `
    <div class="order-btns">
      <button class="order-btn" onclick="moveRow(this,-1)" title="위로">▲</button>
      <button class="order-btn" onclick="moveRow(this,1)"  title="아래로">▼</button>
    </div>
    <select class="mp1" onchange="updateWpickLabels(this.closest('.matchup-row'))">${t1Opts}</select>
    <div class="vs">vs</div>
    <select class="mp2" onchange="updateWpickLabels(this.closest('.matchup-row'))">${t2Opts}</select>
    <input type="text" class="mpmap" placeholder="맵" style="font-size:.78rem;padding:5px 7px" />
    <div class="winner-pick">
      <button class="wpick" onclick="pickWinner(this,'1')">${esc(defaultP1) || '팀1'}</button>
      <button class="wpick" onclick="pickWinner(this,'2')">${esc(defaultP2) || '팀2'}</button>
    </div>
    <button class="btn-ghost btn-sm" style="padding:3px 7px;font-size:.75rem" onclick="this.closest('.matchup-row').remove()">✕</button>`;
  list.appendChild(div);
}

function addTeamGame() {
  const list = document.getElementById('matchupList');
  const div  = document.createElement('div');
  div.className = 'teamgame-row';
  const t1checks = t1.map(p => `
    <label class="tg-check-item">
      <input type="checkbox" class="tg-t1-cb" value="${esc(p)}" /> ${esc(p)}
    </label>`).join('');
  const t2checks = t2.map(p => `
    <label class="tg-check-item">
      <input type="checkbox" class="tg-t2-cb" value="${esc(p)}" /> ${esc(p)}
    </label>`).join('');
  div.innerHTML = `
    <div class="order-btns">
      <button class="order-btn" onclick="moveRow(this,-1)" title="위로">▲</button>
      <button class="order-btn" onclick="moveRow(this,1)"  title="아래로">▼</button>
    </div>
    <div class="tg-checks">${t1checks}</div>
    <div class="tg-label">vs</div>
    <div class="tg-checks">${t2checks}</div>
    <input type="text" class="tg-map" placeholder="맵" style="font-size:.78rem;padding:5px 7px" />
    <div class="winner-pick">
      <button class="wpick" onclick="pickWinner(this,'1')">팀1</button>
      <button class="wpick" onclick="pickWinner(this,'2')">팀2</button>
    </div>
    <button class="btn-ghost btn-sm" style="padding:3px 7px;font-size:.75rem" onclick="this.closest('.teamgame-row').remove()">✕</button>`;
  list.appendChild(div);
}

function moveRow(btn, dir) {
  const row  = btn.closest('.matchup-row, .teamgame-row');
  const list = document.getElementById('matchupList');
  if (dir === -1) {
    const prev = row.previousElementSibling;
    if (prev) list.insertBefore(row, prev);
  } else {
    const next = row.nextElementSibling;
    if (next) list.insertBefore(next, row);
  }
}

function updateWpickLabels(row) {
  const p1 = row.querySelector('.mp1')?.value || '선수1';
  const p2 = row.querySelector('.mp2')?.value || '선수2';
  const btns = row.querySelectorAll('.wpick');
  if (btns[0]) btns[0].textContent = p1 || '선수1';
  if (btns[1]) btns[1].textContent = p2 || '선수2';
}

function pickWinner(btn, side) {
  const row = btn.closest('.matchup-row, .teamgame-row');
  row.querySelectorAll('.wpick').forEach(b => { b.classList.remove('sel1','sel2'); });
  btn.classList.add(side === '1' ? 'sel1' : 'sel2');
  btn.dataset.side = side;
  updateAutoScore();
}

function updateAutoScore() {
  let t1w = 0, t2w = 0;
  document.querySelectorAll('#matchupList .matchup-row, #matchupList .teamgame-row').forEach(row => {
    const sel = [...row.querySelectorAll('.wpick')].find(b => b.classList.contains('sel1') || b.classList.contains('sel2'));
    if (sel) { if (sel.classList.contains('sel1')) t1w++; else t2w++; }
  });
  document.getElementById('roundScore').value = `${t1w}:${t2w}`;
  if (t1w > t2w && t1w + t2w > 0) setTeamWinner(1);
  else if (t2w > t1w && t1w + t2w > 0) setTeamWinner(2);
}

function setTeamWinner(side) {
  teamWinner = side;
  document.getElementById('twBtn1').classList.toggle('sel', side === 1);
  document.getElementById('twBtn2').classList.toggle('sel', side === 2);
}

async function saveRound() {
  const date  = document.getElementById('matchDate').value;
  const score = document.getElementById('roundScore').value.trim();
  if (!date)        { toast('날짜를 선택하세요', true); return; }
  if (!t1.length || !t2.length) { toast('팀 구성을 입력하세요', true); return; }
  if (!teamWinner)  { toast('승리팀을 선택하세요', true); return; }
  if (!score)       { toast('최종 스코어를 입력하세요', true); return; }

  const winTeam = teamWinner === 1 ? [...t1] : [...t2];
  const rows = [];

  // DOM 순서대로 수집 (팀전이 중간에 있어도 올바른 순서 유지)
  document.querySelectorAll('#matchupList .matchup-row, #matchupList .teamgame-row').forEach(row => {
    if (row.classList.contains('matchup-row')) {
      const p1   = row.querySelector('.mp1')?.value;
      const p2   = row.querySelector('.mp2')?.value;
      const map  = row.querySelector('.mpmap')?.value.trim() || '투혼';
      const sel  = [...row.querySelectorAll('.wpick')].find(b => b.classList.contains('sel1') || b.classList.contains('sel2'));
      const side = sel?.dataset.side;
      if (p1 && p2 && side) rows.push({ type: 'solo', p1, p2, map, winner: side === '1' ? p1 : p2 });
    } else {
      const tt1 = [...row.querySelectorAll('.tg-t1-cb:checked')].map(cb => cb.value);
      const tt2 = [...row.querySelectorAll('.tg-t2-cb:checked')].map(cb => cb.value);
      const map  = row.querySelector('.tg-map')?.value.trim() || '';
      const sel  = [...row.querySelectorAll('.wpick')].find(b => b.classList.contains('sel1') || b.classList.contains('sel2'));
      const side = sel?.dataset.side;
      if (tt1.length && tt2.length && side) {
        rows.push({ type: 'team', tt1, tt2, map, winSide: side });
      }
    }
  });

  const btn = document.getElementById('roundSaveBtn');
  btn.disabled = true; btn.textContent = '저장 중...';

  try {
    const nextSeq = await getNextSeq();
    const toInsert = [];

    toInsert.push({ match_date: date, map: 'Match', team1: [...t1], team2: [...t2], winner_arr: winTeam, score: score || null, created_by: currentUser.id, seq: nextSeq });

    let cumT1 = 0, cumT2 = 0;
    rows.forEach((r, i) => {
      if (r.winSide === '1' || (r.type === 'solo' && r.winner === r.p1)) cumT1++;
      else cumT2++;
      const gameScore = `${cumT1}:${cumT2}`;
      if (r.type === 'solo') {
        toInsert.push({ match_date: date, map: r.map, player1: r.p1, player2: r.p2, winner: r.winner, score: gameScore, created_by: currentUser.id, seq: nextSeq + 1 + i });
      } else {
        toInsert.push({ match_date: date, map: r.map, team1: r.tt1, team2: r.tt2, winner_arr: r.winSide === '1' ? r.tt1 : r.tt2, score: gameScore, created_by: currentUser.id, seq: nextSeq + 1 + i });
      }
    });

    const { error } = await sb.from('matches').insert(toInsert);
    if (error) throw error;

    toast(`라운드 저장 완료 (${toInsert.length}경기)`);
    resetTeams();
    await loadRecent();
  } catch (e) {
    toast('저장 실패: ' + e.message, true);
  }
  btn.disabled = false; btn.textContent = '라운드 전체 저장';
}

// ── 단일 입력 함수들 (미사용, 하위 호환용) ────────────────────
function buildTeamInputs() {}
function setSingleTeamWinner() {}

// ── 공통 유틸 ─────────────────────────────────────────────────
async function getNextSeq() {
  const { data } = await sb.from('matches').select('seq').order('seq', { ascending: false }).limit(1);
  return (data?.[0]?.seq || 0) + 1;
}

function arrEq(a, b) {
  if (!Array.isArray(a) || !Array.isArray(b)) return false;
  return JSON.stringify([...a].sort()) === JSON.stringify([...b].sort());
}

// ── 최근 경기 목록 (Match 기준 30건) ─────────────────────────
async function loadRecent() {
  const el = document.getElementById('recentList');
  el.innerHTML = '<p style="color:var(--muted);font-size:.82rem">불러오는 중...</p>';
  const { data, error } = await sb.from('matches').select('*').eq('map', 'Match').order('seq', { ascending: false }).limit(30);
  if (error || !data?.length) { el.innerHTML = '<p style="color:var(--muted);font-size:.82rem">기록 없음</p>'; return; }

  el.innerHTML = '';
  data.forEach(m => {
    const won = arrEq(m.winner_arr, m.team1) ? (m.team1 || []).join(', ') : (m.team2 || []).join(', ');
    const t1str = (m.team1 || []).join(', ');
    const t2str = (m.team2 || []).join(', ');
    const row = document.createElement('div');
    row.className = 'rec-row';
    row.innerHTML = `
      <div style="flex:1;min-width:0">
        <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t1str)} <span style="color:var(--muted)">vs</span> ${esc(t2str)}</div>
        <div class="meta">${m.match_date} · 승: ${esc(won)} · ${esc(m.score || '-')}</div>
      </div>
      <div class="rec-actions">
        <button class="btn-warn btn-sm" onclick="editMatch('${m.id}')">수정</button>
        ${currentRole === 'admin' ? `<button class="btn-danger btn-sm" onclick="delMatch('${m.id}',this)">삭제</button>` : ''}
      </div>`;
    el.appendChild(row);
  });
}

async function delMatch(id, btn) {
  if (!confirm('이 Match와 하위 경기 기록을 모두 삭제하시겠습니까?')) return;
  btn.disabled = true;
  // Match 헤더 정보 조회 후 하위 행 같이 삭제
  const { data: header } = await sb.from('matches').select('seq,match_date').eq('id', id).single();
  if (header) {
    const { data: siblings } = await sb.from('matches').select('id,map,seq').eq('match_date', header.match_date).gt('seq', header.seq).order('seq');
    const subIds = [];
    for (const r of (siblings || [])) { if (r.map === 'Match') break; subIds.push(r.id); }
    if (subIds.length) await sb.from('matches').delete().in('id', subIds);
  }
  const { error } = await sb.from('matches').delete().eq('id', id);
  if (error) { toast('삭제 실패', true); btn.disabled = false; return; }
  toast('삭제 완료');
  await loadRecent();
}

// ── 경기 수정 모달 ────────────────────────────────────────────
async function editMatch(id) {
  const { data: m, error } = await sb.from('matches').select('*').eq('id', id).single();
  if (error || !m) { toast('데이터를 불러올 수 없습니다', true); return; }
  editingMatch = m;
  editWinnerSide = null;
  editSoloWinner = null;

  const isMatchHeader = m.map === 'Match';
  const isTeam = Array.isArray(m.team1) && m.team1.length > 0;

  let html = `
    <div class="edit-field">
      <label class="field-label">날짜</label>
      <input type="date" id="editDate" value="${m.match_date}" />
    </div>`;

  if (isMatchHeader) {
    await editProLeagueMatch(m);
    return;
  } else if (isTeam) {
    // 팀전 수정
    const t1Selects = (m.team1 || []).map(p =>
      `<select class="edit-t1-sel" style="margin-bottom:4px">${playerOptsWithCurrent(p)}</select>`).join('');
    const t2Selects = (m.team2 || []).map(p =>
      `<select class="edit-t2-sel" style="margin-bottom:4px">${playerOptsWithCurrent(p)}</select>`).join('');
    html += `
      <div class="edit-field">
        <label class="field-label">맵</label>
        <input type="text" id="editMap" value="${esc(m.map || '')}" />
      </div>
      <div class="edit-field">
        <label class="field-label">팀 1</label>
        <div style="display:flex;flex-direction:column;gap:4px">${t1Selects}</div>
      </div>
      <div class="edit-field">
        <label class="field-label">팀 2</label>
        <div style="display:flex;flex-direction:column;gap:4px">${t2Selects}</div>
      </div>
      <div class="edit-field">
        <label class="field-label">스코어</label>
        <input type="text" id="editScore" value="${esc(m.score || '')}" />
      </div>
      <div class="edit-field">
        <label class="field-label">승리팀</label>
        <div class="edit-winner-row">
          <button class="ewbtn" id="ewBtn1" onclick="setEditWinner(1)">팀 1 승</button>
          <button class="ewbtn" id="ewBtn2" onclick="setEditWinner(2)">팀 2 승</button>
        </div>
      </div>`;
    editWinnerSide = arrEq(m.winner_arr, m.team1) ? 1 : 2;
  } else {
    // 개인전 수정
    html += `
      <div class="edit-field">
        <label class="field-label">맵</label>
        <input type="text" id="editMap" value="${esc(m.map || '')}" />
      </div>
      <div class="edit-field">
        <label class="field-label">선수 1</label>
        <select id="editP1" onchange="buildEditSoloWinner()">${playerOptsWithCurrent(m.player1)}</select>
      </div>
      <div class="edit-field">
        <label class="field-label">선수 2</label>
        <select id="editP2" onchange="buildEditSoloWinner()">${playerOptsWithCurrent(m.player2)}</select>
      </div>
      <div class="edit-field">
        <label class="field-label">스코어</label>
        <input type="text" id="editScore" value="${esc(m.score || '')}" />
      </div>
      <div class="edit-field">
        <label class="field-label">승자</label>
        <div class="winner-opts" id="editWinnerOpts"></div>
      </div>`;
  }

  document.getElementById('editForm').innerHTML = html;

  // 값 설정 (DOM 생성 후)
  if (isMatchHeader || isTeam) {
    // 승리팀 버튼 초기 상태 반영
    setTimeout(() => setEditWinner(editWinnerSide), 0);
  } else {
    // 개인전: 승자 버튼 빌드 (select 값은 playerOptsWithCurrent에서 이미 selected 처리됨)
    buildEditSoloWinner(m.winner);
  }

  document.getElementById('editModal').classList.add('open');
}

function setEditWinner(side) {
  editWinnerSide = side;
  document.getElementById('ewBtn1')?.classList.toggle('sel', side === 1);
  document.getElementById('ewBtn2')?.classList.toggle('sel', side === 2);
}

function buildEditSoloWinner(preselect) {
  editSoloWinner = preselect || null;
  const p1 = document.getElementById('editP1')?.value;
  const p2 = document.getElementById('editP2')?.value;
  const el = document.getElementById('editWinnerOpts');
  if (!el) return;
  el.innerHTML = '';
  [p1, p2].filter(Boolean).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'wopt' + (name === preselect ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => {
      editSoloWinner = name;
      el.querySelectorAll('.wopt').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    el.appendChild(btn);
  });
}

function closeEdit() {
  document.getElementById('editModal').classList.remove('open');
  document.querySelector('#editModal .modal-box').classList.remove('pro-edit');
  document.querySelector('#editModal h2').textContent = '✏️ 경기 수정';
  document.getElementById('editSaveBtn').onclick = saveEdit;
  editingMatch = null;
  editWinnerSide = null;
  editSoloWinner = null;
  editingProHeader = null;
  editingProRowIds = [];
  editProT1 = []; editProT2 = [];
  editProWinner = null;
}

async function saveEdit() {
  const m = editingMatch;
  if (!m) return;

  const date = document.getElementById('editDate').value;
  if (!date) { toast('날짜를 선택하세요', true); return; }

  const isMatchHeader = m.map === 'Match';
  const isTeam = Array.isArray(m.team1) && m.team1.length > 0;

  let updates = { match_date: date };

  if (!isMatchHeader && isTeam) {
    const t1v = [...document.querySelectorAll('.edit-t1-sel')].map(s => s.value).filter(Boolean);
    const t2v = [...document.querySelectorAll('.edit-t2-sel')].map(s => s.value).filter(Boolean);
    const score = document.getElementById('editScore').value.trim();
    if (!t1v.length || !t2v.length) { toast('팀 구성을 입력하세요', true); return; }
    if (!editWinnerSide) { toast('승리팀을 선택하세요', true); return; }
    updates = { ...updates, team1: t1v, team2: t2v, winner_arr: editWinnerSide === 1 ? t1v : t2v, score: score || null };
    updates.map = document.getElementById('editMap').value.trim();
  } else {
    const p1  = document.getElementById('editP1').value;
    const p2  = document.getElementById('editP2').value;
    const map = document.getElementById('editMap').value.trim();
    const sc  = document.getElementById('editScore').value.trim();
    if (!p1 || !p2) { toast('선수를 선택하세요', true); return; }
    if (!editSoloWinner) { toast('승자를 선택하세요', true); return; }
    if (!map) { toast('맵을 입력하세요', true); return; }
    updates = { ...updates, player1: p1, player2: p2, map, winner: editSoloWinner, score: sc || null };
  }

  const saveBtn = document.getElementById('editSaveBtn');
  saveBtn.disabled = true; saveBtn.textContent = '저장 중...';
  const { error } = await sb.from('matches').update(updates).eq('id', m.id);
  saveBtn.disabled = false; saveBtn.textContent = '저장';

  if (error) { toast('수정 실패: ' + error.message, true); return; }
  toast('수정 완료');
  closeEdit();
  await loadRecent();
}

// ── 프로리그 라운드 수정 ──────────────────────────────────────
async function editProLeagueMatch(m) {
  // 관련 매치업 행 로드 (같은 날짜, seq > header.seq, 다음 Match 행 전까지)
  const { data: siblings } = await sb.from('matches')
    .select('*')
    .eq('match_date', m.match_date)
    .gt('seq', m.seq)
    .order('seq');

  const matchupRows = [];
  for (const row of (siblings || [])) {
    if (row.map === 'Match') break;
    matchupRows.push(row);
  }

  editingProHeader = m;
  editingProRowIds = matchupRows.map(r => r.id);
  editProT1 = [...(m.team1 || [])];
  editProT2 = [...(m.team2 || [])];
  editProWinner = arrEq(m.winner_arr, m.team1) ? 1 : 2;

  const box = document.querySelector('#editModal .modal-box');
  box.classList.add('pro-edit');
  document.querySelector('#editModal h2').textContent = '✏️ 프로리그 라운드 수정';
  document.getElementById('editSaveBtn').onclick = saveProLeagueEdit;

  document.getElementById('editForm').innerHTML = `
    <div class="edit-field">
      <label class="field-label">날짜</label>
      <input type="date" id="editDate" value="${m.match_date}" />
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
      <div class="team-summary t1">
        <div class="ts-label">🔵 팀 1</div>
        <div class="ts-players">${esc(editProT1.join(', '))}</div>
      </div>
      <div class="team-summary t2">
        <div class="ts-label">🔴 팀 2</div>
        <div class="ts-players">${esc(editProT2.join(', '))}</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:6px;align-items:center;flex-wrap:wrap">
      <span style="font-size:.82rem;color:var(--muted)">매치업 추가</span>
      <button class="btn-ghost btn-sm" onclick="addEditMatchup()">+ 개인전</button>
      <button class="btn-ghost btn-sm" onclick="addEditTeamGame()">+ 팀전</button>
    </div>
    <div style="display:grid;grid-template-columns:22px 1fr 36px 1fr 100px 1fr 28px;gap:6px;padding:0 10px;margin-bottom:2px">
      <span></span>
      <span style="font-size:.72rem;color:var(--muted)">🔵 팀1 선수</span>
      <span></span>
      <span style="font-size:.72rem;color:var(--muted)">🔴 팀2 선수</span>
      <span style="font-size:.72rem;color:var(--muted)">맵</span>
      <span style="font-size:.72rem;color:var(--muted)">승자</span>
      <span></span>
    </div>
    <div class="matchup-list" id="editMatchupList"></div>
    <div class="final-row" style="margin-top:14px">
      <div class="field-group">
        <label class="field-label">최종 스코어</label>
        <input type="text" id="editRoundScore" value="${esc(m.score || '')}" placeholder="예: 3:4" />
      </div>
      <div class="field-group">
        <label class="field-label">승리팀</label>
        <div class="team-winner-btns">
          <button class="twbtn" id="editTwBtn1" onclick="setEditProWinner(1)">팀 1 승</button>
          <button class="twbtn" id="editTwBtn2" onclick="setEditProWinner(2)">팀 2 승</button>
        </div>
      </div>
    </div>`;

  // 기존 매치업 행들 채우기
  matchupRows.forEach(row => {
    if (row.player1 != null) {
      addEditMatchup(row.player1, row.player2, row.map, row.winner);
    } else {
      addEditTeamGame(row.team1 || [], row.team2 || [], row.map, row.winner_arr || []);
    }
  });

  setTimeout(() => setEditProWinner(editProWinner), 0);
  document.getElementById('editModal').classList.add('open');
}

function addEditMatchup(defaultP1 = '', defaultP2 = '', defaultMap = '', winner = null) {
  const list = document.getElementById('editMatchupList');
  const div = document.createElement('div');
  div.className = 'matchup-row';
  const t1Opts = '<option value="">선택</option>' +
    editProT1.map(p => `<option value="${esc(p)}"${p === defaultP1 ? ' selected' : ''}>${esc(p)}</option>`).join('');
  const t2Opts = '<option value="">선택</option>' +
    editProT2.map(p => `<option value="${esc(p)}"${p === defaultP2 ? ' selected' : ''}>${esc(p)}</option>`).join('');
  div.innerHTML = `
    <div class="order-btns">
      <button class="order-btn" onclick="moveEditRow(this,-1)" title="위로">▲</button>
      <button class="order-btn" onclick="moveEditRow(this,1)"  title="아래로">▼</button>
    </div>
    <select class="mp1" onchange="updateEditWpickLabels(this.closest('.matchup-row'))">${t1Opts}</select>
    <div class="vs">vs</div>
    <select class="mp2" onchange="updateEditWpickLabels(this.closest('.matchup-row'))">${t2Opts}</select>
    <input type="text" class="mpmap" placeholder="맵" value="${esc(defaultMap)}" style="font-size:.78rem;padding:5px 7px" />
    <div class="winner-pick">
      <button class="wpick" onclick="pickEditWinner(this,'1')">${esc(defaultP1) || '팀1'}</button>
      <button class="wpick" onclick="pickEditWinner(this,'2')">${esc(defaultP2) || '팀2'}</button>
    </div>
    <button class="btn-ghost btn-sm" style="padding:3px 7px;font-size:.75rem" onclick="this.closest('.matchup-row').remove()">✕</button>`;
  list.appendChild(div);
  if (winner) {
    const btns = div.querySelectorAll('.wpick');
    if (winner === defaultP1)  { btns[0].classList.add('sel1'); btns[0].dataset.side = '1'; }
    else if (winner === defaultP2) { btns[1].classList.add('sel2'); btns[1].dataset.side = '2'; }
  }
}

function addEditTeamGame(t1arr = [], t2arr = [], defaultMap = '', winnerArr = []) {
  const list = document.getElementById('editMatchupList');
  const div = document.createElement('div');
  div.className = 'teamgame-row';
  const t1checks = editProT1.map(p => `
    <label class="tg-check-item">
      <input type="checkbox" class="tg-t1-cb" value="${esc(p)}" ${t1arr.includes(p) ? 'checked' : ''} /> ${esc(p)}
    </label>`).join('');
  const t2checks = editProT2.map(p => `
    <label class="tg-check-item">
      <input type="checkbox" class="tg-t2-cb" value="${esc(p)}" ${t2arr.includes(p) ? 'checked' : ''} /> ${esc(p)}
    </label>`).join('');
  const winSide = arrEq(winnerArr, t1arr) ? '1' : (arrEq(winnerArr, t2arr) ? '2' : null);
  div.innerHTML = `
    <div class="order-btns">
      <button class="order-btn" onclick="moveEditRow(this,-1)" title="위로">▲</button>
      <button class="order-btn" onclick="moveEditRow(this,1)"  title="아래로">▼</button>
    </div>
    <div class="tg-checks">${t1checks}</div>
    <div class="tg-label">vs</div>
    <div class="tg-checks">${t2checks}</div>
    <input type="text" class="tg-map" placeholder="맵" value="${esc(defaultMap)}" style="font-size:.78rem;padding:5px 7px" />
    <div class="winner-pick">
      <button class="wpick${winSide === '1' ? ' sel1' : ''}" onclick="pickEditWinner(this,'1')" ${winSide === '1' ? 'data-side="1"' : ''}>팀1</button>
      <button class="wpick${winSide === '2' ? ' sel2' : ''}" onclick="pickEditWinner(this,'2')" ${winSide === '2' ? 'data-side="2"' : ''}>팀2</button>
    </div>
    <button class="btn-ghost btn-sm" style="padding:3px 7px;font-size:.75rem" onclick="this.closest('.teamgame-row').remove()">✕</button>`;
  list.appendChild(div);
}

function moveEditRow(btn, dir) {
  const row  = btn.closest('.matchup-row, .teamgame-row');
  const list = document.getElementById('editMatchupList');
  if (dir === -1) { const prev = row.previousElementSibling; if (prev) list.insertBefore(row, prev); }
  else            { const next = row.nextElementSibling;     if (next) list.insertBefore(next, row); }
}

function pickEditWinner(btn, side) {
  const row = btn.closest('.matchup-row, .teamgame-row');
  row.querySelectorAll('.wpick').forEach(b => b.classList.remove('sel1','sel2'));
  btn.classList.add(side === '1' ? 'sel1' : 'sel2');
  btn.dataset.side = side;
}

function updateEditWpickLabels(row) {
  const p1 = row.querySelector('.mp1')?.value || '선수1';
  const p2 = row.querySelector('.mp2')?.value || '선수2';
  const btns = row.querySelectorAll('.wpick');
  if (btns[0]) btns[0].textContent = p1;
  if (btns[1]) btns[1].textContent = p2;
}

function setEditProWinner(side) {
  editProWinner = side;
  document.getElementById('editTwBtn1')?.classList.toggle('sel', side === 1);
  document.getElementById('editTwBtn2')?.classList.toggle('sel', side === 2);
}

async function saveProLeagueEdit() {
  const m = editingProHeader;
  if (!m) return;

  const date  = document.getElementById('editDate').value;
  const score = document.getElementById('editRoundScore').value.trim();
  if (!date)         { toast('날짜를 선택하세요', true); return; }
  if (!editProWinner){ toast('승리팀을 선택하세요', true); return; }
  if (!score)        { toast('최종 스코어를 입력하세요', true); return; }

  const winTeam = editProWinner === 1 ? [...editProT1] : [...editProT2];
  const newRows = [];

  // DOM 순서대로 수집 (팀전이 중간에 있어도 올바른 순서 유지)
  document.querySelectorAll('#editMatchupList .matchup-row, #editMatchupList .teamgame-row').forEach(row => {
    if (row.classList.contains('matchup-row')) {
      const p1  = row.querySelector('.mp1')?.value;
      const p2  = row.querySelector('.mp2')?.value;
      const map = row.querySelector('.mpmap')?.value.trim() || '투혼';
      const sel = [...row.querySelectorAll('.wpick')].find(b => b.classList.contains('sel1') || b.classList.contains('sel2'));
      const side = sel?.dataset.side;
      if (p1 && p2 && side) newRows.push({ type: 'solo', p1, p2, map, winner: side === '1' ? p1 : p2 });
    } else {
      const tt1 = [...row.querySelectorAll('.tg-t1-cb:checked')].map(cb => cb.value);
      const tt2 = [...row.querySelectorAll('.tg-t2-cb:checked')].map(cb => cb.value);
      const map = row.querySelector('.tg-map')?.value.trim() || '';
      const sel = [...row.querySelectorAll('.wpick')].find(b => b.classList.contains('sel1') || b.classList.contains('sel2'));
      const side = sel?.dataset.side;
      if (tt1.length && tt2.length && side) newRows.push({ type: 'team', tt1, tt2, map, winSide: side });
    }
  });

  const saveBtn = document.getElementById('editSaveBtn');
  saveBtn.disabled = true; saveBtn.textContent = '저장 중...';

  try {
    // 1. Match 헤더 업데이트
    const { error: hErr } = await sb.from('matches').update({
      match_date: date,
      winner_arr: winTeam,
      score: score || null,
    }).eq('id', m.id);
    if (hErr) throw hErr;

    // 누적 스코어 계산
    let cT1 = 0, cT2 = 0;
    const gameScores = newRows.map(r => {
      if (r.winSide === '1' || (r.type === 'solo' && r.winner === r.p1)) cT1++;
      else cT2++;
      return `${cT1}:${cT2}`;
    });

    const existingIds = [...editingProRowIds];
    const updateCount = Math.min(existingIds.length, newRows.length);

    // 2. 기존 매치업 행 in-place 업데이트 (seq 유지 → 순서 및 그룹핑 보존)
    for (let i = 0; i < updateCount; i++) {
      const r = newRows[i];
      let upd = { match_date: date, score: gameScores[i] };
      if (r.type === 'solo') {
        upd = { ...upd, map: r.map, player1: r.p1, player2: r.p2, winner: r.winner,
                team1: null, team2: null, winner_arr: null };
      } else {
        upd = { ...upd, map: r.map, team1: r.tt1, team2: r.tt2,
                winner_arr: r.winSide === '1' ? r.tt1 : r.tt2,
                player1: null, player2: null, winner: null };
      }
      const { error } = await sb.from('matches').update(upd).eq('id', existingIds[i]);
      if (error) throw error;
    }

    // 3. 남는 기존 행 삭제 (매치업이 줄었을 때)
    const toDelete = existingIds.slice(newRows.length);
    if (toDelete.length) {
      const { error } = await sb.from('matches').delete().in('id', toDelete);
      if (error) throw error;
    }

    // 4. 새 행 삽입 (매치업이 늘었을 때)
    const toAdd = newRows.slice(existingIds.length);
    if (toAdd.length) {
      const nextSeq = await getNextSeq();
      const toInsert = toAdd.map((r, i) => {
        const idx = existingIds.length + i;
        const base = { match_date: date, created_by: currentUser.id, seq: nextSeq + i, score: gameScores[idx] };
        if (r.type === 'solo') {
          return { ...base, map: r.map, player1: r.p1, player2: r.p2, winner: r.winner };
        } else {
          return { ...base, map: r.map, team1: r.tt1, team2: r.tt2, winner_arr: r.winSide === '1' ? r.tt1 : r.tt2 };
        }
      });
      const { error } = await sb.from('matches').insert(toInsert);
      if (error) throw error;
    }

    toast(`프로리그 라운드 수정 완료 (매치업 ${newRows.length}경기)`);
    closeEdit();
    await loadRecent();
  } catch (e) {
    toast('수정 실패: ' + e.message, true);
  }

  saveBtn.disabled = false; saveBtn.textContent = '저장';
}

// ── 선수 관리 ─────────────────────────────────────────────────
async function renderPlayerTable() {
  const tbody = document.getElementById('playerTableBody');
  tbody.innerHTML = '<tr><td colspan="4" style="color:var(--muted)">불러오는 중...</td></tr>';
  await loadPlayers();
  if (!playerList.length) { tbody.innerHTML = '<tr><td colspan="4" style="color:var(--muted)">선수 없음</td></tr>'; return; }
  tbody.innerHTML = playerList.map(p => `
    <tr data-player="${esc(p.id)}">
      <td><strong>${esc(p.id)}</strong></td>
      <td>${p.race}</td>
      <td style="color:${tierColor(p.tier)}">${p.tier}</td>
      <td>
        <div style="display:flex;gap:4px">
          ${currentRole === 'admin' ? `
            <button class="btn-warn btn-sm" onclick="editPlayerRow('${esc(p.id)}')">수정</button>
            <button class="btn-danger btn-sm" onclick="deletePlayer('${esc(p.id)}',this)">삭제</button>
          ` : ''}
        </div>
      </td>
    </tr>`).join('');
}

function editPlayerRow(id) {
  const p = playerList.find(x => x.id === id);
  if (!p) return;
  const tr = document.querySelector(`tr[data-player="${CSS.escape(id)}"]`);
  if (!tr) return;
  const raceOpts = ['Terran','Protoss','Zerg'].map(r => `<option${r === p.race ? ' selected' : ''}>${r}</option>`).join('');
  const tierOpts = ['Stone','Bronze','Silver','Gold','Diamond','Legend'].map(t => `<option${t === p.tier ? ' selected' : ''}>${t}</option>`).join('');
  tr.innerHTML = `
    <td><strong>${esc(p.id)}</strong></td>
    <td><select id="ep-race" style="padding:4px 6px;font-size:.82rem">${raceOpts}</select></td>
    <td><select id="ep-tier" style="padding:4px 6px;font-size:.82rem">${tierOpts}</select></td>
    <td>
      <div style="display:flex;gap:4px">
        <button class="btn-success btn-sm" onclick="savePlayerEdit('${esc(id)}')">저장</button>
        <button class="btn-ghost btn-sm" onclick="renderPlayerTable()">취소</button>
      </div>
    </td>`;
}

async function savePlayerEdit(id) {
  const race = document.getElementById('ep-race').value;
  const tier = document.getElementById('ep-tier').value;
  const { error } = await sb.from('players').update({ race, tier }).eq('id', id);
  if (error) { toast('수정 실패: ' + error.message, true); return; }
  toast(`${id} 수정 완료`);
  await renderPlayerTable();
}

async function addPlayer() {
  const id   = document.getElementById('newId').value.trim();
  const race = document.getElementById('newRace').value;
  const tier = document.getElementById('newTier').value;
  if (!id) { toast('닉네임을 입력하세요', true); return; }
  const { error } = await sb.from('players').insert({ id, race, tier });
  if (error) { toast('추가 실패: ' + (error.message.includes('duplicate') ? '이미 존재하는 ID입니다' : error.message), true); return; }
  document.getElementById('newId').value = '';
  toast(`${id} 추가 완료`);
  await renderPlayerTable();
}

async function deletePlayer(id, btn) {
  if (!confirm(`'${id}' 선수를 삭제하시겠습니까?\n경기 기록은 유지됩니다.`)) return;
  btn.disabled = true;
  const { error } = await sb.from('players').delete().eq('id', id);
  if (error) { toast('삭제 실패', true); btn.disabled = false; return; }
  toast(`${id} 삭제 완료`);
  await renderPlayerTable();
}

function tierColor(t) {
  return { Stone:'#8b8b8b', Bronze:'#cd7f32', Silver:'#c0c0c0', Gold:'#ffd700', Diamond:'#67e8f9', Legend:'#ff7f50' }[t] || '#eee';
}

// ── 토스트 / 이스케이프 ───────────────────────────────────────
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 2800);
}
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
